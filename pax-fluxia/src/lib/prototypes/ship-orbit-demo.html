<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pax Fluxia - Ship Orbit Demo (Concentric Rings)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
        }

        .controls label {
            display: block;
            margin: 8px 0;
        }

        .controls input[type="range"] {
            width: 150px;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <div class="controls">
        <h3 style="margin-bottom: 12px;">Concentric Ring Orbit Demo</h3>
        <label>
            Ships: <span id="shipCountLabel">40</span>
            <input type="range" id="shipCount" min="1" max="200" value="40">
        </label>
        <p style="margin-top: 15px; opacity: 0.7; font-size: 12px;">
            Ships orbit in concentric rings, tightly packed.<br>
            Uses the same getOrbitSlot logic as the game.
        </p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Config - matches GAME_CONFIG
        const SHIP_BASE_SIZE = 4;
        const PADDING = 2;
        const RING_SPACING = SHIP_BASE_SIZE * 1.4;

        let shipCount = 40;

        // ============================================================================
        // getOrbitSlot - EXACT COPY from render.utils.ts
        // ============================================================================
        function getOrbitSlot(index, cx, cy, starRadius, time) {
            const BASE_SIZE = SHIP_BASE_SIZE;

            // Determine which layer (ring) this index belongs to
            // Fill inner rings first
            let layer = 0;
            let currentRadius = starRadius + PADDING + BASE_SIZE;
            let countInInnerLayers = 0;

            while (true) {
                const circumference = 2 * Math.PI * currentRadius;
                const capacity = Math.max(1, Math.floor(circumference / (BASE_SIZE * 1.5)));

                if (index < countInInnerLayers + capacity) {
                    // It's in this layer
                    const indexInRing = index - countInInnerLayers;
                    const angleStep = (2 * Math.PI) / capacity;

                    // Rotate rings slowly, alternating direction
                    const ringRotation = time * (0.2 / (layer + 1)) * (layer % 2 === 0 ? 1 : -1);
                    const angle = indexInRing * angleStep + ringRotation;

                    return {
                        x: cx + Math.cos(angle) * currentRadius,
                        y: cy + Math.sin(angle) * currentRadius
                    };
                }

                countInInnerLayers += capacity;
                currentRadius += RING_SPACING;
                layer++;

                // Safety break
                if (layer > 20) {
                    return {
                        x: cx + Math.cos(index) * (currentRadius + 20),
                        y: cy + Math.sin(index) * (currentRadius + 20)
                    };
                }
            }
        }

        // Star data
        const stars = [
            { x: 0, y: 0, radius: 30, color: '#22c55e', ships: 40 },
            { x: 0, y: 0, radius: 30, color: '#ef4444', ships: 40 }
        ];

        function updateStarPositions() {
            stars[0].x = canvas.width * 0.35;
            stars[0].y = canvas.height * 0.5;
            stars[1].x = canvas.width * 0.65;
            stars[1].y = canvas.height * 0.5;
        }
        updateStarPositions();
        window.addEventListener('resize', updateStarPositions);

        let animationTime = 0;

        function render() {
            const now = performance.now() / 1000; // seconds
            animationTime = now;

            // Clear
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Starfield
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 80; i++) {
                const x = (i * 73 + 17) % canvas.width;
                const y = (i * 31 + 41) % canvas.height;
                const size = (i % 3) * 0.5 + 0.5;
                ctx.globalAlpha = 0.2 + (i % 5) * 0.08;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Draw connection line
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(stars[0].x, stars[0].y);
            ctx.lineTo(stars[1].x, stars[1].y);
            ctx.stroke();

            // Draw each star
            stars.forEach((star, starIndex) => {
                // Star glow
                const gradient = ctx.createRadialGradient(
                    star.x, star.y, 0,
                    star.x, star.y, star.radius * 2
                );
                gradient.addColorStop(0, star.color + '60');
                gradient.addColorStop(0.5, star.color + '20');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius * 2, 0, Math.PI * 2);
                ctx.fill();

                // Star core
                ctx.fillStyle = star.color;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();

                // Ships in concentric rings
                for (let i = 0; i < star.ships; i++) {
                    const pos = getOrbitSlot(i, star.x, star.y, star.radius, animationTime);

                    ctx.fillStyle = star.color;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, SHIP_BASE_SIZE * 0.8, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Ship count label
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(star.ships.toString(), star.x, star.y);
            });

            requestAnimationFrame(render);
        }
        render();

        // Controls
        document.getElementById('shipCount').addEventListener('input', (e) => {
            shipCount = parseInt(e.target.value);
            document.getElementById('shipCountLabel').textContent = shipCount;
            stars[0].ships = shipCount;
            stars[1].ships = shipCount;
        });
    </script>
</body>

</html>
